<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel Administrativo - SchoolConnect</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="../img/logo.png" type="image/png" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#15803D",
            secondary: "#16A34A",
            accent: "#FACC15",
            dark: "#0F172A"
          }
        }
      }
    };
  </script>
  <style>
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .spinner {
      border: 3px solid #e5e7eb;
      border-top: 3px solid #15803D;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      animation: spin 0.8s linear infinite;
      display: inline-block;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .nav-group-title {
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      padding: 0.75rem 1rem 0.25rem;
      font-weight: 700;
    }
    .codigo-box {
      font-family: monospace;
      letter-spacing: 0.15em;
      background: #f0fdf4;
      border: 2px dashed #16a34a;
      color: #15803d;
      font-size: 1.1rem;
      font-weight: 700;
      text-align: center;
      padding: 0.75rem;
      border-radius: 0.75rem;
    }
    .upload-zone {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 0.75rem 1rem;
      border: 2px dashed #d1d5db;
      border-radius: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .upload-zone:hover {
      border-color: #FACC15;
      background: rgba(250,204,21,0.05);
    }
    .upload-zone.has-file {
      border-color: #15803D;
      background: rgba(21,128,61,0.05);
    }
    .img-preview {
      width: 100%;
      max-height: 160px;
      object-fit: cover;
      border-radius: 0.75rem;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body class="bg-gray-100">
  <div class="flex min-h-screen" id="app">
    <!-- Sidebar será carregada via JS -->
  </div>

  <script>
    const API = "https://schoolconnect-0ud2.onrender.com";
    
    // Verificar autenticação
    (function() {
      const token = localStorage.getItem("adminToken");
      if (!token) {
        window.location.href = "login-admin.html";
      }
    })();

    function getToken() {
      return localStorage.getItem("adminToken") || "";
    }

    async function apiFetch(url, opts = {}) {
      const token = getToken();
      const headers = {
        "Content-Type": "application/json",
        ...(opts.headers || {})
      };
      if (token) {
        headers["Authorization"] = "Bearer " + token;
      }
      return fetch(API + url, { ...opts, headers });
    }

    function toast(msg, tipo = "sucesso") {
      const toastDiv = document.getElementById("toast");
      if (!toastDiv) return;
      const inner = document.getElementById("toastInner");
      inner.className = "flex items-center gap-3 px-5 py-3 rounded-xl shadow-xl text-white font-medium text-sm fade-in " +
        (tipo === "sucesso" ? "bg-green-600" : tipo === "erro" ? "bg-red-600" : "bg-blue-600");
      document.getElementById("toastIcon").textContent = tipo === "sucesso" ? "✓" : tipo === "erro" ? "✕" : "ℹ";
      document.getElementById("toastMsg").textContent = msg;
      toastDiv.classList.remove("hidden");
      setTimeout(() => toastDiv.classList.add("hidden"), 3500);
    }

    function fecharModal(id) {
      const modal = document.getElementById(id);
      if (modal) {
        modal.style.display = "none";
        modal.classList.add("hidden");
      }
    }

    function abrirModal(id) {
      const modal = document.getElementById(id);
      if (modal) {
        modal.style.display = "flex";
        modal.classList.remove("hidden");
      }
    }

    function terminarSessao() {
      if (confirm("Tem certeza que deseja terminar a sessão?")) {
        localStorage.removeItem("adminToken");
        localStorage.removeItem("adminLogado");
        localStorage.removeItem("token");
        localStorage.removeItem("usuario");
        window.location.href = "login-admin.html";
      }
    }

    // Funções globais para modais
    window.fecharModal = fecharModal;
    window.abrirModal = abrirModal;
    window.terminarSessao = terminarSessao;
    window.toast = toast;
    window.apiFetch = apiFetch;
    window.getToken = getToken;

    // Carregar estrutura da página
    fetch("admin-structure.html")
      .then(res => res.text())
      .then(html => {
        document.getElementById("app").innerHTML = html;
        // Inicializar após carregar o HTML
        setTimeout(() => initAdmin(), 100);
      })
      .catch(() => {
        document.getElementById("app").innerHTML = '<div class="p-8 text-center">Erro ao carregar página. <a href="login-admin.html" class="text-primary">Voltar ao login</a></div>';
      });
  </script>
</body>
</html>
