<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acesso Administrativo - SchoolConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="utils.js"></script>
    <link rel="icon" href="../img/logo.png" type="image/png" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#15803D",
              secondary: "#16A34A",
              accent: "#FACC15",
            },
          },
        },
      };
    </script>
    <style>
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .fade-up {
        animation: fadeUp 0.5s ease forwards;
      }
    </style>
  </head>

  <body
    class="min-h-screen bg-cover bg-center flex items-center justify-center"
    style="background-image: url(&quot;../img/background.png&quot;)"
  >
    <div class="absolute inset-0 bg-black/40"></div>

    <div
      class="relative bg-white/90 backdrop-blur border border-white/40 p-8 rounded-2xl shadow-2xl w-[90%] max-w-sm fade-up"
    >
      <div class="text-center mb-10">
        <!-- LOGO -->
        <div class="flex justify-center mb-4">
          <div
            class="w-20 h-20 bg-white shadow-lg rounded-2xl flex items-center justify-center border border-gray-100"
          >
            <img
              src="../img/logo.png"
              class="h-12 object-contain"
              alt="Logo Instituto"
            />
          </div>
        </div>

        <!-- BADGE -->
        <div
          class="inline-flex items-center gap-2 bg-primary/10 text-primary px-4 py-1.5 rounded-full text-xs font-semibold mb-3 shadow-sm"
        >
          <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
            <path
              fill-rule="evenodd"
              d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z"
              clip-rule="evenodd"
            />
          </svg>
          Área Restrita
        </div>

        <!-- TÍTULO -->
        <h2 class="text-2xl font-bold text-gray-800 tracking-wide">
          Acesso Administrativo
        </h2>

        <!-- DESCRIÇÃO -->
        <p class="text-gray-500 text-sm mt-2">
          Apenas para administradores do sistema
        </p>
      </div>

      <!-- ERRO -->
      <div
        id="errorBox"
        class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-lg"
      >
        <p class="text-sm text-red-700" id="errorMsg"></p>
      </div>

      <!-- FORM -->
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1"
            >Utilizador</label
          >
          <input
            type="text"
            id="adminUser"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition"
            placeholder="admin"
            autocomplete="username"
          />
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1"
            >Palavra-passe</label
          >
          <div class="relative">
            <input
              type="password"
              id="adminSenha"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition"
              placeholder="••••••••"
              autocomplete="current-password"
            />
            <button
              type="button"
              id="toggleSenha"
              class="absolute right-3 top-3 text-gray-400 hover:text-gray-600"
            >
              <svg
                class="h-5 w-5"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                />
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                />
              </svg>
            </button>
          </div>
        </div>

        <button
          type="button"
          id="btnAdmin"
          class="w-full bg-primary text-white py-3 rounded-lg hover:bg-secondary font-semibold transition"
        >
          <span id="btnAdminText">Entrar como Administrador</span>
        </button>
      </div>

      <div class="mt-6 text-center">
        <a
          href="login.html"
          class="text-xs text-gray-400 hover:text-gray-600 transition"
        >
          ← Voltar ao login normal
        </a>
      </div>
    </div>

    <script>
      const API = "http://localhost:3002";

      document.getElementById("toggleSenha").addEventListener("click", () => {
        const input = document.getElementById("adminSenha");
        input.type = input.type === "password" ? "text" : "password";
      });

      document.getElementById("adminSenha").addEventListener("keydown", (e) => {
        if (e.key === "Enter") fazerLoginAdmin();
      });

      document
        .getElementById("btnAdmin")
        .addEventListener("click", fazerLoginAdmin);

      function mostrarErro(msg) {
        document.getElementById("errorMsg").textContent = msg;
        document.getElementById("errorBox").classList.remove("hidden");
      }

      async function fazerLoginAdmin() {
        const utilizador = document.getElementById("adminUser").value.trim();
        const senha = document.getElementById("adminSenha").value;

        if (!utilizador || !senha) {
          mostrarErro("Preencha o utilizador e a palavra-passe.");
          return;
        }

        const btn = document.getElementById("btnAdmin");
        const text = document.getElementById("btnAdminText");
        btn.disabled = true;
        text.textContent = "A verificar...";

        try {
          const res = await fetch(API + "/api/admin/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ utilizador, senha }),
          });

          const data = await res.json();

          if (!res.ok) throw new Error(data.error || "Credenciais inválidas");

          // Guardar token admin
          localStorage.setItem("adminToken", data.token);
          localStorage.setItem("adminLogado", "true");
          
          // Limpar tokens de usuário regular para evitar conflitos
          localStorage.removeItem("token");
          localStorage.removeItem("usuario");

          toast("Login realizado com sucesso");
          setTimeout(() => window.location.href = "admin.html", 1000);
        } catch (err) {
          mostrarErro(err.message);
        } finally {
          btn.disabled = false;
          text.textContent = "Entrar como Administrador";
        }
      }
    </script>
  </body>
</html>
