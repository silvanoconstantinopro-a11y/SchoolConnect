services:
  - type: web
    name: schoolconnect-api
    runtime: node
    plan: free
    region: ohio
    buildCommand: |
      npm ci --legacy-peer-deps
      cd back-end && npm ci --legacy-peer-deps
      cd ..
      npx prisma generate
    startCommand: cd back-end && node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:./dev.db
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://schoolconnect-0ud2.onrender.com
    disk:
      name: schoolconnect-data
      mountPath: /opt/render/project/src/back-end
      sizeGB: 1